services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - stimli-data:/app/.data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  stimli-data:

