# Automated dependency + security updates. Stimli handles authenticated user
# data (Clerk, Stripe, Neon) so keeping the dependency tree patched matters.
# Minor/patch bumps are grouped into one PR per ecosystem to keep the noise
# down; majors come through individually so they get a deliberate review.
version: 2
updates:
  # Root workspace: serverless API deps (@clerk/backend, stripe, neon) + wrangler.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      root-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend workspace (React / Vite / Vitest) has its own lockfile.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # FastAPI research backend.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Modal inference image deps move slower; monthly is plenty.
  - package-ecosystem: "pip"
    directory: "/inference"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3

  # Keep the GitHub Actions in CI / deploy workflows current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
