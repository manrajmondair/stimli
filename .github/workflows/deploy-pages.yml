name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel a previous run if a new push comes in while it's still building.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: npm ci
      - run: python -m pip install -r backend/requirements.txt

      - name: Verify deploy secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          missing=()
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN VITE_CLERK_PUBLISHABLE_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Verify Pages runtime secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          required=(POSTGRES_URL CLERK_SECRET_KEY CLERK_PUBLISHABLE_KEY)
          secrets="$(npx wrangler pages secret list --project-name=stimli)"
          missing=()
          for name in "${required[@]}"; do
            if ! grep -Eq "^[[:space:]]*-[[:space:]]+${name}:" <<<"$secrets"; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Cloudflare Pages secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Run tests
        # Gate every production deploy on the full Node + Vitest suite so a
        # broken main never ships. npm test runs api → web → build sequentially
        # so this step also produces the artifact the deploy step uploads.
        # Intentionally do NOT forward VITE_CLERK_PUBLISHABLE_KEY here: when
        # it's set, the Landing component calls useUser() without a
        # ClerkProvider wrapper in jsdom and the test crashes. The build step
        # below threads it in for the production bundle where it's needed.
        run: npm test

      - name: Build frontend
        env:
          # Vite reads VITE_* env vars at build time and bakes the values into
          # the bundle. Without VITE_CLERK_PUBLISHABLE_KEY the app still renders
          # but auth surfaces show an "unconfigured" banner. Set this secret
          # alongside CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.
          #
          # VITE_API_BASE is intentionally NOT forwarded: when GitHub Actions
          # references an unset secret the env var becomes empty string,
          # which Vite then bakes into the bundle and overrides the "/api"
          # default. The same-origin Pages Function lives at /api/*, so the
          # default is correct; only override locally via a .env file if the
          # API is hosted elsewhere.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=stimli --branch=main --commit-hash=${{ github.sha }}

      - name: Verify production health
        run: |
          for attempt in $(seq 1 10); do
            if curl --fail --silent --show-error https://stimli.pages.dev/api/health -o health.json; then
              node -e "const fs=require('fs'); const health=JSON.parse(fs.readFileSync('health.json','utf8')); if (health.status !== 'ok') { console.error(JSON.stringify(health)); process.exit(1); }"
              exit 0
            fi
            sleep 6
          done
          echo "Production health check did not pass." >&2
          exit 1

      - name: Verify production app shell
        run: |
          for path in / /app /app/team /share/deploy-smoke /invite/deploy-smoke; do
            status="$(curl --silent --show-error --output app-shell.html --write-out "%{http_code}" "https://stimli.pages.dev${path}")"
            if [ "$status" != "200" ]; then
              echo "Expected ${path} to serve the SPA shell, got HTTP ${status}." >&2
              exit 1
            fi
            if ! grep -qi '<div id="root"' app-shell.html; then
              echo "Expected ${path} to serve the Vite app shell." >&2
              exit 1
            fi
          done
