name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel a previous run if a new push comes in while it's still building.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Run tests
        # Gate every production deploy on the full Node + Vitest suite so a
        # broken main never ships. npm test runs api → web → build sequentially
        # so this step also produces the artifact the deploy step uploads.
        # Intentionally do NOT forward VITE_CLERK_PUBLISHABLE_KEY here: when
        # it's set, the Landing component calls useUser() without a
        # ClerkProvider wrapper in jsdom and the test crashes. The build step
        # below threads it in for the production bundle where it's needed.
        run: npm test

      - name: Build frontend
        env:
          # Vite reads VITE_* env vars at build time and bakes the values into
          # the bundle. Without VITE_CLERK_PUBLISHABLE_KEY the app still renders
          # but auth surfaces show an "unconfigured" banner. Set this secret
          # alongside CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.
          #
          # VITE_API_BASE is intentionally NOT forwarded: when GitHub Actions
          # references an unset secret the env var becomes empty string,
          # which Vite then bakes into the bundle and overrides the "/api"
          # default. The same-origin Pages Function lives at /api/*, so the
          # default is correct; only override locally via a .env file if the
          # API is hosted elsewhere.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=stimli --branch=main --commit-hash=${{ github.sha }}
