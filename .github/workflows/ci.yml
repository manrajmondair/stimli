name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Run full test suite
        # Same chain the deploy workflow runs: node-native API tests, then the
        # Vitest frontend suite, then a production Vite build as a final
        # correctness check.
        # Intentionally do NOT forward VITE_CLERK_PUBLISHABLE_KEY here: when
        # it's set, the Landing component calls useUser() without a
        # ClerkProvider wrapper in jsdom and the test crashes. The deploy
        # workflow's build step threads it in for the production bundle where
        # it actually needs to be baked.
        run: npm test
