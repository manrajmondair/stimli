# Full test gate — Node API suite, Vitest, pytest, and a production build —
# on every push and pull request. The deploy workflow runs the same chain.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: npm ci
      - run: python -m pip install -r backend/requirements.txt

      - name: Run full test suite
        # Same chain the deploy workflow runs: node-native API tests, then the
        # Vitest frontend suite, backend pytest, then a production Vite build
        # as a final correctness check.
        # Intentionally do NOT forward VITE_CLERK_PUBLISHABLE_KEY here: when
        # it's set, the Landing component calls useUser() without a
        # ClerkProvider wrapper in jsdom and the test crashes. The deploy
        # workflow's build step threads it in for the production bundle where
        # it actually needs to be baked.
        run: npm test
